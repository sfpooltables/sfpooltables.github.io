<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>San Francisco pool table ratings</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1>San Francisco pool table ratings</h1>
        <p class="tagline">
          One guy's reviews of public pool tables in San Francisco, CA. Click a venue on the map
          or in the list for details
        </p>
        <p id="preview-warning" class="preview-warning" hidden></p>
      </div>
    </header>

    <main class="layout">
      <section class="panel map-panel">
        <div class="panel-heading">
          <h2>Map</h2>
          <!-- <p>Zoom in, click markers, and compare locations geographically.</p> -->
        </div>
        <div id="map" aria-label="Map of San Francisco pool table venues"></div>
      </section>


      <aside class="panel list-panel">
        <div class="panel-heading">
          <h2>Venues</h2>
          <label class="sort-control" for="sort-select">
            Sort by
            <select id="sort-select" name="sort-select">
              <option value="rating">Highest rating</option>
              <option value="name">Alphabetical</option>
            </select>
          </label>
        </div>
        <div id="venue-count" class="subtle"></div>
        <ul id="venue-list" class="venue-list" aria-live="polite"></ul>
      </aside>

      <section class="panel details-panel">
        <div class="panel-heading">
          <h2>Venue Details</h2>
          <!-- <p>Table specs, playability notes, and overall rating</p> -->
        </div>
        <div id="details" class="details-empty">
          Select a venue on the map or the list to view information about its pool table(s)
        </div>
      </section>
    </main>

    <!-- <footer class="site-footer">
      <p>
        Starter site for GitHub Pages. Add venue files in
        <code>data/venues/</code> and load them in <code>index.html</code>.
      </p>
    </footer>
    -->

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./data/venues.js"></script>
    <script src="./data/venues/blackbird.js"></script>
    <script src="./data/venues/connecticut-yankee.js"></script>
    <script src="./data/venues/gino-carlo.js"></script>
    <script src="./data/venues/happy-lounge.js"></script>
    <script src="./data/venues/harper-rye.js"></script>
    <script src="./data/venues/karls-beacon.js"></script>
    <script src="./data/venues/lone-star.js"></script>
    <script src="./data/venues/philosophers-club.js"></script>
    <script src="./data/venues/pilsner-inn.js"></script>
    <script src="./data/venues/sea-star.js"></script>
    <script src="./data/venues/st-marys.js"></script>
    <script src="./data/venues/the-hall.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
